substitutions:
  _REGION: us-central1
  _REPO: fitness-bot
  _BOT_SERVICE: fitness-bot
  _ADMIN_SERVICE: fitness-admin
  _GCS_BUCKET: whatsapp-bot-494313-uploads

steps:
  # ---- Build bot image ----
  - id: build-bot
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:latest
      - .

  # ---- Build admin image (parallel with bot) ----
  - id: build-admin
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.admin
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:latest
      - .
    waitFor: ["-"]

  # ---- Push bot image ----
  - id: push-bot
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot
    waitFor: [build-bot]

  # ---- Push admin image ----
  - id: push-admin
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin
    waitFor: [build-admin]

  # ---- Run database migrations ----
  - id: migrate
    name: gcr.io/cloud-builders/docker
    entrypoint: sh
    args:
      - -c
      - |
        echo "Running migrations with DATABASE_URL..."
        docker run --rm \
          -e DATABASE_URL=$$DATABASE_URL \
          -w /app \
          ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:$SHORT_SHA \
          prisma migrate deploy --schema ./prisma/schema.prisma
    secretEnv: ['DATABASE_URL']
    waitFor: [push-bot]

  # ---- Update Bot image (Terraform manages config) ----
  - id: deploy-bot
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_BOT_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:$SHORT_SHA
      - --region=${_REGION}
      - --quiet
    waitFor: [migrate]

  # ---- Update Admin image (Terraform manages config) ----
  - id: deploy-admin
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_ADMIN_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:$SHORT_SHA
      - --region=${_REGION}
      - --quiet
    waitFor: [push-admin]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:latest

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL_TCP/versions/latest
      env: DATABASE_URL

options:
  logging: GCS_ONLY
  logsBucket: gs://whatsapp-bot-494313-cloudbuild-logs
  machineType: E2_HIGHCPU_8

timeout: 1200s
