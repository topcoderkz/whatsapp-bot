substitutions:
  _REGION: us-central1
  _REPO: fitness-bot
  _BOT_SERVICE: fitness-bot
  _ADMIN_SERVICE: fitness-admin

steps:
  # ---- Build bot image ----
  - id: build-bot
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:latest
      - .

  # ---- Build admin image (parallel with bot) ----
  - id: build-admin
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.admin
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:latest
      - .
    waitFor: ["-"]

  # ---- Push bot image ----
  - id: push-bot
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot
    waitFor: [build-bot]

  # ---- Push admin image ----
  - id: push-admin
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin
    waitFor: [build-admin]

  # ---- Run database migrations (non-blocking, from source) ----
  - id: migrate
    name: node:20-alpine
    entrypoint: sh
    args:
      - -c
      - |
        cd packages/bot
        echo "Installing prisma CLI..."
        npx --yes prisma@6 migrate deploy --schema ./prisma/schema.prisma || echo "WARNING: Migration failed, continuing deployment"
    secretEnv: ['DATABASE_URL']
    waitFor: ['-']

  # ---- Deploy Bot ----
  - id: deploy-bot
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services update ${_BOT_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:$SHORT_SHA \
          --region=${_REGION} --quiet || \
        gcloud run deploy ${_BOT_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:$SHORT_SHA \
          --region=${_REGION} --platform=managed --allow-unauthenticated --quiet
    waitFor: [push-bot, migrate]

  # ---- Deploy Admin ----
  - id: deploy-admin
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services update ${_ADMIN_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:$SHORT_SHA \
          --region=${_REGION} --quiet || \
        gcloud run deploy ${_ADMIN_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:$SHORT_SHA \
          --region=${_REGION} --platform=managed --allow-unauthenticated --quiet
    waitFor: [push-admin, migrate]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:latest

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL_TCP/versions/latest
      env: DATABASE_URL

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
