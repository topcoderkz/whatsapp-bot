substitutions:
  _REGION: us-central1
  _REPO: fitness-bot
  _BOT_SERVICE: fitness-bot
  _ADMIN_SERVICE: fitness-admin
  _LANDING_SERVICE: fitness-landing

steps:
  # ---- Build bot image ----
  - id: build-bot
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:latest
      - .

  # ---- Build admin image (parallel with bot) ----
  - id: build-admin
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.admin
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:latest
      - .
    waitFor: ["-"]

  # ---- Build landing image (parallel with bot and admin) ----
  - id: build-landing
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.landing
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/landing:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/landing:latest
      - .
    waitFor: ["-"]

  # ---- Push bot image ----
  - id: push-bot
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot
    waitFor: [build-bot]

  # ---- Push admin image ----
  - id: push-admin
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin
    waitFor: [build-admin]

  # ---- Push landing image ----
  - id: push-landing
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/landing
    waitFor: [build-landing]

  # ---- Run database migrations ----
  - id: migrate-db
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        # Get public IP of Cloud SQL instance
        DB_IP=$$(gcloud sql instances describe fitness-bot-db --format="value(ipAddresses[0].ipAddress)")

        # Apply migrations using psql
        for migration_file in packages/bot/prisma/migrations/*/migration.sql; do
          echo "Applying: $$migration_file"
          PGPASSWORD=$$DB_PASSWORD psql -h $$DB_IP -U fitness -d fitness_bot \
            -v ON_ERROR_STOP=1 < "$$migration_file" || echo "Migration already applied or failed"
        done
    waitFor: [push-bot]
    secretEnv: ['DB_PASSWORD']

  # ---- Deploy Bot ----
  - id: deploy-bot
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services update ${_BOT_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:$SHORT_SHA \
          --region=${_REGION} --quiet || \
        gcloud run deploy ${_BOT_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:$SHORT_SHA \
          --region=${_REGION} --platform=managed --allow-unauthenticated --quiet
    waitFor: [migrate-db]

  # ---- Deploy Admin ----
  - id: deploy-admin
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services update ${_ADMIN_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:$SHORT_SHA \
          --region=${_REGION} --quiet || \
        gcloud run deploy ${_ADMIN_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:$SHORT_SHA \
          --region=${_REGION} --platform=managed --allow-unauthenticated --quiet
    waitFor: [push-admin, migrate-db]

  # ---- Deploy Landing ----
  - id: deploy-landing
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services update ${_LANDING_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/landing:$SHORT_SHA \
          --region=${_REGION} --quiet || \
        gcloud run deploy ${_LANDING_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/landing:$SHORT_SHA \
          --region=${_REGION} --platform=managed --allow-unauthenticated \
          --add-cloudsql-instances=$PROJECT_ID:${_REGION}:fitness-bot-db \
          --set-env-vars="NODE_ENV=production,DATABASE_URL=postgresql://fitness:$$DB_PASSWORD@localhost:5432/fitness_bot?host=/cloudsql/$PROJECT_ID:${_REGION}:fitness-bot-db" \
          --quiet
    waitFor: [push-landing, migrate-db]
    secretEnv: ['DB_PASSWORD']

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bot:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/admin:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/landing:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/landing:latest

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/fitness-db-password/versions/latest
      env: DB_PASSWORD

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
